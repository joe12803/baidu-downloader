name: Offline Download to Baidu
on:
  workflow_dispatch:
    inputs:
      download_url:
        description: '资源下载链接'
        required: true
      save_path:
        description: '百度网盘保存路径'
        default: '/apps/transfer'
        required: true

jobs:
  transfer:
    runs-on: ubuntu-latest
    steps:
      - name: Install Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y aria2 python3-pip curl unzip
          wget https://github.com/qjfoidnh/BaiduPCS-Go/releases/download/v3.9.5/BaiduPCS-Go-v3.9.5-linux-amd64.zip
          unzip BaiduPCS-Go-*.zip
          sudo mv BaiduPCS-Go-*/BaiduPCS-Go /usr/local/bin/
          chmod +x /usr/local/bin/BaiduPCS-Go

      - name: Download Content
        run: |
          mkdir -p downloads
          aria2c -x 16 -s 16 -d downloads "${{ github.event.inputs.download_url }}"

      - name: Secret Synclogin Attempt
        run: |
          # 登录
          BaiduPCS-Go login -bduss="${{ secrets.BAIDU_BDUSS }}" -stoken="${{ secrets.BAIDU_STOKEN }}"
          
          # 使用百度内部同步盘身份 (ID: 250528)
          echo ">>> 模拟百度内部同步盘身份..."
          BaiduPCS-Go config set -appid 250528
          BaiduPCS-Go config set -user_agent "netdisk;P2SP;3.0.0.8;netdisk;11.12.3;iPhone;iOS15.0"
          BaiduPCS-Go config set -pan_ua "netdisk;P2SP;3.0.0.8;netdisk;11.12.3;iPhone;iOS15.0"
          
          # 强制开启 HTTPS 并清理缓存
          BaiduPCS-Go config set -enable_https true
          
          # 执行上传
          BaiduPCS-Go upload downloads/* "${{ github.event.inputs.save_path }}/"
