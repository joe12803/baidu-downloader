name: Offline Download to Baidu
on:
  workflow_dispatch:
    inputs:
      download_url:
        description: '资源下载链接'
        required: true
      save_path:
        description: '百度网盘保存路径'
        default: '/apps/transfer'
        required: true

jobs:
  transfer:
    runs-on: ubuntu-latest
    steps:
      - name: Install Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y aria2 python3-pip curl unzip
          # 安装 BaiduPCS-Go
          wget https://github.com/qjfoidnh/BaiduPCS-Go/releases/download/v3.9.5/BaiduPCS-Go-v3.9.5-linux-amd64.zip
          unzip BaiduPCS-Go-*.zip
          sudo mv BaiduPCS-Go-*/BaiduPCS-Go /usr/local/bin/
          chmod +x /usr/local/bin/BaiduPCS-Go
          # 安装 Deno (帮助 yt-dlp 处理 JS 脚本绕过验证)
          curl -fsSL https://deno.land/x/install/install.sh | sh
          echo "$HOME/.deno/bin" >> $GITHUB_PATH
          # 安装 yt-dlp
          sudo wget https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -O /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: Login to Baidu
        run: |
          BaiduPCS-Go login -bduss="${{ secrets.BAIDU_BDUSS }}" -stoken="${{ secrets.BAIDU_STOKEN }}"

      - name: Download Content
        run: |
          mkdir -p downloads
          URL="${{ github.event.inputs.download_url }}"
          
          if [[ "$URL" == *"youtube.com"* ]] || [[ "$URL" == *"youtu.be"* ]] || [[ "$URL" == *"bilibili.com"* ]]; then
            echo "Detected video platform URL, using yt-dlp with Deno..."
            # 增加 user-agent 伪装
            yt-dlp --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"                    -f "bestvideo+bestaudio/best" --merge-output-format mp4 -o "downloads/%(title)s.%(ext)s" "$URL"
          else
            echo "Using aria2c for direct/magnet link..."
            aria2c -x 16 -s 16 -d downloads "$URL"
          fi

      - name: Upload to Baidu
        run: |
          BaiduPCS-Go mkdir "${{ github.event.inputs.save_path }}" || true
          BaiduPCS-Go upload downloads/* "${{ github.event.inputs.save_path }}/"
