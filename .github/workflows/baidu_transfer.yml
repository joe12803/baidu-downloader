name: Offline Download to Baidu
on:
  workflow_dispatch:
    inputs:
      download_url:
        description: '资源下载链接'
        required: true
      save_path:
        description: '百度网盘保存路径'
        default: '/apps/transfer'
        required: true

jobs:
  transfer:
    runs-on: ubuntu-latest
    steps:
      - name: Install Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y aria2 python3-pip curl unzip
          wget https://github.com/qjfoidnh/BaiduPCS-Go/releases/download/v3.9.5/BaiduPCS-Go-v3.9.5-linux-amd64.zip
          unzip BaiduPCS-Go-*.zip
          sudo mv BaiduPCS-Go-*/BaiduPCS-Go /usr/local/bin/
          chmod +x /usr/local/bin/BaiduPCS-Go

      - name: Download Content
        run: |
          mkdir -p downloads
          aria2c -x 16 -s 16 -d downloads "${{ github.event.inputs.download_url }}"

      - name: Multi-Config Upload Attempt
        run: |
          BaiduPCS-Go login -bduss="${{ secrets.BAIDU_BDUSS }}" -stoken="${{ secrets.BAIDU_STOKEN }}"
          
          # 方案 A: NAS 方案
          echo ">>> 尝试方案 A: NAS 官方配置..."
          BaiduPCS-Go config set -appid 266719 -user_agent "netdisk;P2SP;3.0.0.8;netdisk;11.12.3;ANG-AN00;android-android;10.0;JSbridge4.4.0;jointBridge;1.1.0;"
          BaiduPCS-Go upload downloads/* "${{ github.event.inputs.save_path }}/" && exit 0 || echo "方案 A 失败，继续尝试..."

          # 方案 B: iPhone 方案
          echo ">>> 尝试方案 B: iPhone 深度伪装..."
          BaiduPCS-Go config set -appid 266719 -user_agent "netdisk;11.12.3;iPhone;iOS15.0"
          BaiduPCS-Go upload downloads/* "${{ github.event.inputs.save_path }}/" && exit 0 || echo "方案 B 失败，继续尝试..."

          # 方案 C: 旧版兼容
          echo ">>> 尝试方案 C: 旧版兼容配置..."
          BaiduPCS-Go config set -appid 266719 -user_agent "Mozilla/5.0 (Macintosh; Intel Mac OS X 10_13_2) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/63.0.3239.132 Safari/537.36"
          BaiduPCS-Go upload downloads/* "${{ github.event.inputs.save_path }}/" && exit 0 || echo "所有方案均已失败。"
          exit 1
