name: Offline Download to Baidu
on:
  workflow_dispatch:
    inputs:
      download_url:
        description: '资源下载链接'
        required: true
      save_path:
        description: '百度网盘保存路径 (必须以 / 开头)'
        default: '/apps/transfer'
        required: true

jobs:
  transfer:
    runs-on: ubuntu-latest
    steps:
      - name: Install Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y aria2 python3-pip curl unzip
          wget https://github.com/qjfoidnh/BaiduPCS-Go/releases/download/v3.9.5/BaiduPCS-Go-v3.9.5-linux-amd64.zip
          unzip BaiduPCS-Go-*.zip
          sudo mv BaiduPCS-Go-*/BaiduPCS-Go /usr/local/bin/
          chmod +x /usr/local/bin/BaiduPCS-Go

      - name: Download Content
        run: |
          mkdir -p downloads
          aria2c -x 16 -s 16 -d downloads "${{ github.event.inputs.download_url }}"

      - name: Precise Android Simulation Upload
        run: |
          # 1. 登录
          BaiduPCS-Go login -bduss="${{ secrets.BAIDU_BDUSS }}" -stoken="${{ secrets.BAIDU_STOKEN }}"
          
          # 2. 按照用户提供的成功案例进行配置
          echo ">>> 配置模拟安卓身份 (AppID 266719 + 特定 UA)..."
          BaiduPCS-Go config set -appid 266719
          BaiduPCS-Go config set -user_agent "netdisk;2.2.51.7;j690a;android-android;10"
          
          # 3. 打印当前配置进行确认
          BaiduPCS-Go config list
          
          # 4. 规范化路径并上传 (确保路径以 / 开头，不带末尾斜杠)
          DEST_PATH="${{ github.event.inputs.save_path }}"
          # 去掉末尾可能的斜杠
          DEST_PATH=$(echo $DEST_PATH | sed 's#/$##')
          
          echo ">>> 目标路径规范化为: $DEST_PATH"
          BaiduPCS-Go mkdir "$DEST_PATH" || true
          BaiduPCS-Go upload downloads/* "$DEST_PATH"
